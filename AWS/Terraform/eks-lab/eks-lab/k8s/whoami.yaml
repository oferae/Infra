---
# App que mostra o hostname/IP do pod que atendeu a requisição.
# Com 3 réplicas você vê o load balancing alternando a cada refresh.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: whoami
  namespace: demo
  labels: { app: whoami }
spec:
  replicas: 3
  selector:
    matchLabels: { app: whoami }
  template:
    metadata:
      labels: { app: whoami }
      annotations:
        ad.datadoghq.com/whoami.logs: '[{"source":"whoami","service":"whoami"}]'
    spec:
      containers:
        - name: whoami
          image: traefik/whoami:v1.10.2
          ports:
            - containerPort: 80
          resources:
            requests: { cpu: "50m", memory: "32Mi" }
            limits:   { cpu: "100m", memory: "64Mi" }
---
apiVersion: v1
kind: Service
metadata:
  name: whoami
  namespace: demo
spec:
  selector: { app: whoami }
  ports:
    - port: 80
      targetPort: 80
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: whoami
  namespace: demo
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  ingressClassName: nginx
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: whoami
                port: { number: 80 }
